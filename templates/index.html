<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Token Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .update-time {
            color: #888;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #888;
            font-size: 0.9em;
        }

        .stat-card.cost .value {
            color: #ffd700;
        }

        .stat-card.highlight {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .stat-card.highlight .value {
            color: #667eea;
            font-size: 2.2em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card h2 {
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .model-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .model-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .model-stats {
            text-align: right;
        }

        .model-tokens {
            font-size: 0.9em;
            color: #888;
        }

        .model-cost {
            color: #ffd700;
            font-weight: bold;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }

        .sonnet { background: linear-gradient(90deg, #667eea, #764ba2); }
        .opus { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .haiku { background: linear-gradient(90deg, #4facfe, #00f2fe); }

        .today-section {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.15), rgba(0, 242, 254, 0.15));
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .today-section .today-title {
            font-size: 1.5em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .today-section .today-title .live-dot {
            width: 12px;
            height: 12px;
            background: #4facfe;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .today-stats {
            display: flex;
            gap: 40px;
        }

        .today-stat {
            text-align: center;
        }

        .today-stat .value {
            font-size: 2em;
            font-weight: bold;
            color: #4facfe;
        }

        .today-stat .label {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .today-section {
                flex-direction: column;
                text-align: center;
            }
            .today-stats {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Claude Code Token Stats</h1>
            <p class="update-time" id="update-time">加载中...</p>
        </header>

        <!-- 今日实时统计 -->
        <div class="today-section">
            <div class="today-title">
                <span class="live-dot"></span>
                今日实时统计
            </div>
            <div class="today-stats">
                <div class="today-stat">
                    <div class="value" id="today-tokens">-</div>
                    <div class="label">今日 Token</div>
                </div>
                <div class="today-stat">
                    <div class="value" id="today-requests">-</div>
                    <div class="label">今日请求</div>
                </div>
                <div class="today-stat">
                    <div class="value" id="today-cost">-</div>
                    <div class="label">今日费用</div>
                </div>
            </div>
        </div>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card highlight">
                <div class="icon">📊</div>
                <div class="value" id="total-tokens">-</div>
                <div class="label">总 Token 消耗</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔢</div>
                <div class="value" id="total-requests">-</div>
                <div class="label">API 请求次数</div>
            </div>
            <div class="stat-card">
                <div class="icon">📥</div>
                <div class="value" id="total-input">-</div>
                <div class="label">总输入 Token</div>
            </div>
            <div class="stat-card">
                <div class="icon">📤</div>
                <div class="value" id="total-output">-</div>
                <div class="label">总输出 Token</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚡</div>
                <div class="value" id="cache-read">-</div>
                <div class="label">缓存读取</div>
            </div>
            <div class="stat-card cost">
                <div class="icon">💰</div>
                <div class="value" id="total-cost">-</div>
                <div class="label">预估费用</div>
            </div>
            <div class="stat-card">
                <div class="icon">💬</div>
                <div class="value" id="total-messages">-</div>
                <div class="label">总消息数</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="value" id="total-sessions">-</div>
                <div class="label">总会话数</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>🤖 各模型使用详情</h2>
                <div id="model-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📈 每日 Token 使用趋势</h2>
                <div class="chart-container">
                    <canvas id="daily-chart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📊 活动统计</h2>
            <div class="chart-container">
                <canvas id="activity-chart"></canvas>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadStats()" title="刷新数据">🔄</button>

    <script>
        let dailyChart = null;
        let activityChart = null;

        function formatTokens(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        function formatNumber(n) {
            return n.toLocaleString();
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.error) {
                    document.getElementById('model-list').innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                // 更新统计卡片
                document.getElementById('total-tokens').textContent = formatTokens(data.totals.totalTokens);
                document.getElementById('total-requests').textContent = formatNumber(data.totalApiCalls || data.totalRequests);
                document.getElementById('total-input').textContent = formatTokens(data.totals.inputTokens);
                document.getElementById('total-output').textContent = formatTokens(data.totals.outputTokens);
                document.getElementById('cache-read').textContent = formatTokens(data.totals.cacheReadInputTokens);
                document.getElementById('total-cost').textContent = '$' + data.totals.totalCost.toFixed(2);
                document.getElementById('total-messages').textContent = formatNumber(data.totalMessages);
                document.getElementById('total-sessions').textContent = data.totalSessions;

                // 更新今日统计
                const today = new Date().toISOString().split('T')[0];
                const todayData = data.dailyTokens.find(d => d.date === today);
                if (todayData) {
                    document.getElementById('today-tokens').textContent = formatTokens(todayData.total);
                    document.getElementById('today-requests').textContent = formatNumber(todayData.apiCalls || todayData.requests || 0);
                    // 计算今日费用 (假设 Sonnet 定价)
                    const todayCost = (todayData.input / 1_000_000) * 3.00 + (todayData.output / 1_000_000) * 15.00;
                    document.getElementById('today-cost').textContent = '$' + todayCost.toFixed(2);
                } else {
                    document.getElementById('today-tokens').textContent = '0';
                    document.getElementById('today-requests').textContent = '0';
                    document.getElementById('today-cost').textContent = '$0.00';
                }

                // 更新时间
                document.getElementById('update-time').textContent =
                    '最后更新: ' + new Date(data.lastUpdated).toLocaleString('zh-CN');

                // 模型列表
                const modelList = document.getElementById('model-list');
                const totalTokens = data.models.reduce((sum, m) => sum + m.inputTokens + m.outputTokens, 0);

                modelList.innerHTML = data.models.map(model => {
                    const modelTotal = model.inputTokens + model.outputTokens;
                    const percentage = totalTokens > 0 ? (modelTotal / totalTokens * 100).toFixed(1) : 0;
                    const colorClass = model.id.includes('sonnet') ? 'sonnet' :
                                      model.id.includes('opus') ? 'opus' : 'haiku';

                    return `
                        <div class="model-item">
                            <div>
                                <div class="model-name">${model.name}</div>
                                <div class="model-tokens">
                                    输入: ${formatTokens(model.inputTokens)} |
                                    输出: ${formatTokens(model.outputTokens)}
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${colorClass}" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                            <div class="model-stats">
                                <div class="model-cost">$${model.cost.total.toFixed(2)}</div>
                                <div class="model-tokens">${percentage}%</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 每日图表
                const dailyCtx = document.getElementById('daily-chart').getContext('2d');
                const dailyLabels = data.dailyTokens.map(d => d.date);
                const dailyData = data.dailyTokens.map(d => d.total);

                if (dailyChart) dailyChart.destroy();
                dailyChart = new Chart(dailyCtx, {
                    type: 'line',
                    data: {
                        labels: dailyLabels,
                        datasets: [{
                            label: 'Token 使用量',
                            data: dailyData,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#888' }
                            },
                            x: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#888' }
                            }
                        }
                    }
                });

                // 活动图表
                const activityCtx = document.getElementById('activity-chart').getContext('2d');
                const activityLabels = data.dailyActivity.map(d => d.date);
                const messagesData = data.dailyActivity.map(d => d.messages);
                const toolCallsData = data.dailyActivity.map(d => d.toolCalls);

                if (activityChart) activityChart.destroy();
                activityChart = new Chart(activityCtx, {
                    type: 'bar',
                    data: {
                        labels: activityLabels,
                        datasets: [
                            {
                                label: '消息数',
                                data: messagesData,
                                backgroundColor: 'rgba(102, 126, 234, 0.8)',
                            },
                            {
                                label: '工具调用',
                                data: toolCallsData,
                                backgroundColor: 'rgba(240, 147, 251, 0.8)',
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#888' }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#888' }
                            },
                            x: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#888' }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('model-list').innerHTML =
                    `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 初始加载
        loadStats();

        // 每30秒自动刷新
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
